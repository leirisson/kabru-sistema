services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kabru
      POSTGRES_PASSWORD: kabru_dev
      POSTGRES_DB: kabru_sistema
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kabru -d kabru_sistema"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://kabru:kabru_dev@postgres:5432/kabru_sistema
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-flash-1.5}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
